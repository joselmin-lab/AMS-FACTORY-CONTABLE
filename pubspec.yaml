name: ams_control_contable
description: AMS Control Contable - Sistema de control contable para fábrica de amortiguadores.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.5.6

  # UI utilities
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
